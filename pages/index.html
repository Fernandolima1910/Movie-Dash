<!DOCTYPE html>
<html lang="Pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Dash</title>
    <link rel="stylesheet" href="../style/style_index.css">
</head>

<body>
    <nav id="barra_lateral">

        <div>
            <h1> Movie Dash</h1>

            <div id="nav_lateral">

                <div class="incaps_lat">
                    <img src="../Imagens/casa.png" class="icn_lat">
                    <div class="cont_nav">Home </div>
                </div>
                <div class="incaps_lat">
                    <img src="../Imagens/lupa.png" class="icn_lat">
                    <div class="cont_nav"> Pesquisar</div>
                </div>
                <div class="incaps_lat">
                    <img src="../Imagens/do-utilizador.png" class="icn_lat">
                    <div class="cont_nav"> Perfil</div>
                </div>
                <div class="incaps_lat">
                    <img src="../Imagens/mais.png" class="icn_lat">
                    <div class="cont_nav">Assistclassos</div>
                </div>
                <div class="incaps_lat">
                    <img src="../Imagens/pessoas.png" class="icn_lat">
                    <div class="cont_nav"> Match Room</div>
                </div>
                <div class="incaps_lat">
                    <img src="../Imagens/dinheiro.png" class="icn_lat">
                    <div class="cont_nav">Analise de gastos</div>
                </div>

            </div>
        </div>


    </nav>

    <main> <!-- todo conteudo da pagina lado esquerdo -->
        <div id="container">
            <div id="catalago_filme">
                <div id="post_film">
                    conteudo do filme
                </div>
                <div id="tit_film">
                    <h6>Titulo do filme</h6>
                </div>
          
                <div id="botoes_catalago">
                    <div id="btn_escolha">
                        <img class="incaps_img_escolha" src="../Imagens/botao-play-ponta-de-seta.png" alt="">
                        <div class="txt_btn_incapsu">Assista agora</div>                              
                    </div>
                    <div id="btn_escolha_mais_tarde">
                        <img class="incaps_img_escolha" src="../Imagens/mais (2).png" alt="">
                        <div class="txt_btn_incapsu">Assistir mais tarde</div>
                    </div>
                    <div id="btn_escolha_info">
                        <img class="incaps_img_escolha" src="../Imagens/em-formacao.png" alt="">
                        <div class="txt_btn_incapsu">Detalhes</div>

                    </div>
                </div>
            </div>

            <div id="escolha_filme">

            </div>
        </div>
    </main>
</body>



</html>
